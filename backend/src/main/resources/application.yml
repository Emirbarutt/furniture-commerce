spring:
  application:
    name: furniture-commerce
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/furniture_commerce}
    username: ${DATABASE_USERNAME:furniture_commerce}
    password: ${DATABASE_PASSWORD:change-me}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
